#
# Those who need more control or want to add additional details to the contact values can use
# contact directly and follow the format outlined in the ImplementationGuide resource and
# ContactDetail.
#
# contact:
#   - name: Bob Smith
#     telecom:
#       - system: email # phone | fax | email | pager | url | sms | other
#         value: bobsmith@example.org
#         use: work
#
#
# The global property corresponds to the IG.global property, but it
# uses the type as the YAML key and the profile as its value. Since
# FHIR does not explicitly disallow more than one profile per type,
# neither do we; the value can be a single profile URL or an array
# of profile URLs.
#
# global:
#   Patient: http://example.org/fhir/StructureDefinition/my-patient-profile
#   Encounter: http://example.org/fhir/StructureDefinition/my-encounter-profile
#
#
# The resources property corresponds to IG.definition.resource.
# SUSHI can auto-generate all of the resource entries based on
# the FSH definitions and/or information in any user-provided
# JSON or XML resource files. If the generated entries are not
# sufficient or complete, however, the author can add entries
# here. If the reference matches a generated entry, it will
# replace the generated entry. If it doesn't match any generated
# entries, it will be added to the generated entries. The format
# follows IG.definition.resource with the following differences:
#   * use IG.definition.resource.reference.reference as the YAML key
#   * specify "omit" to omit a FSH-generated resource from the
#     resource list.
#   * groupingId can be used, but top-level groups syntax may be a
#     better option (see below).
# The following are simple examples to demonstrate what this might
# look like:
#
# resources:
#   Patient/my-example-patient:
#     name: My Example Patient
#     description: An example Patient
#     exampleBoolean: true
#   Patient/bad-example: omit

resources:
  AllergyIntolerance/bee-pollen-pat-sf:
    name: AllergyIntolerance - Bee Pollen
    description: Example of allergy intolerance for the *Smart Health Checks AllergyIntolerance* profile. Represents an active allergy using coded data for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  AllergyIntolerance/AllergyIntolerance-ExtractBundleEntry1-pat-sf:
    name: AllergyIntolerance - Extract Bundle Entry 1
    description: Example of allergy intolerance for the *Smart Health Checks AllergyIntolerance* profile. Represents an active aspirin allergy for patient, Mrs. Smart Form. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Bundle/sdc-template-extract-928bbdd27d15:
    name: Bundle - SDC Template Extract
    description: Example of a bundle generated by a SHC App actor after performing SDC extraction. The extract reflects the Aboriginal and Torres Strait Islander Health Check Questionnaire that defines a template based extraction method. Patient, Mrs. Smart Form.
    exampleBoolean: true
  Condition/Condition-ExtractBundleEntry1-pat-sf:
    name: Condition - Extract Bundle Entry 1
    description: Example of condition for the *Smart Health Checks Condition* profile. Represents an active condition using text for patient, Mrs. Smart Form. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Condition/Condition-ExtractBundleEntry2-pat-sf:
    name: Condition - Extract Bundle Entry 2
    description: Example of condition for the *Smart Health Checks Condition* profile. Represents an active condition using coded data for patient, Mrs. Smart Form. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Condition/fever-pat-sf:
    name: Condition - Fever
    description: Example of condition for the *Smart Health Checks Condition* profile. Represents an active fever condition for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Encounter/health-check-pat-sf:
    name: Encounter - Health Check
    description: Example of encounter for the *Smart Health Checks Encounter* profile. Represents an in-progress health check encounter for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor as launch context.
    exampleBoolean: true
  Immunization/Immunization-ExtractBundleEntry1-pat-sf:
    name: Immunization - Extract Bundle Entry 1
    description: Example of immunization for the *Smart Health Checks Immunization* profile. Represents a completed immunization for patient, Mrs. Smart Form. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Medication/bisoprolol-external-pat-sf:
    name: Medication - Bisoprolol
    description: Example of medication for the *Smart Health Checks Medication* profile. Represents an external medication resource referenced by the MedicationStatement example, *MedicationStatement - Active Bisoprolol External*.
    exampleBoolean: true
  MedicationStatement/active-bisoprolol-external-pat-sf:
    name: MedicationStatement - Active Bisoprolol External
    description: Example of medication statement for the *Smart Health Checks MedicationStatement* profile. Represents an active medication statement for patient, Mrs. Smart Form with an external medication reference to the Medication example, Medication - Bisoprolol. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  MedicationStatement/active-bisoprolol-internal-pat-sf:
    name: MedicationStatement - Active Bisoprolol Internal
    description: Example of medication statement for the *Smart Health Checks MedicationStatement* profile. Represents an active medication statement for patient, Mrs. Smart Form with a internal contained medication reference. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  MedicationStatement/chloramphenicol-pat-sf:
    name: MedicationStatement - Chloramphenicol
    description: Example of medication statement for the *Smart Health Checks MedicationStatement* profile. Represents a coded medication statement for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  MedicationStatement/MedicationStatement-ExtractBundleEntry1-pat-sf:
    name: MedicationStatement - Extract Bundle Entry 1
    description: Example of medication statement for the *Smart Health Checks MedicationStatement* profile. Represents an active medication statement for patient, Mrs. Smart Form. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Observation/BloodPressure-pat-sf:
    name: Observation - Blood Pressure
    description: Example of observation for the *Smart Health Checks Blood Pressure* profile. Represents vital signs blood pressure measurement for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Observation/BodyHeight-pat-sf:
    name: Observation - Body Height
    description: Example of observation for the *Smart Health Checks Body Height* profile. Represents vital signs body height measurement for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Observation/BodyWeight-pat-sf:
    name: Observation - Body Weight
    description: Example of observation for the *Smart Health Checks Body Weight* profile. Represents vital signs body weight measurement for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Observation/HeadCircumference-baby-smith-john:
    name: Observation - Head Circumference
    description: Example of observation for the *Smart Health Checks Head Circumference* profile. Represents vital signs head circumference measurement for patient, Baby of Emma Smith. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Observation/HeartRate-pat-sf:
    name: Observation - Heart Rate
    description: Example of observation for the *Smart Health Checks Heart Rate* profile. Represents vital signs heart rate measurement for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Observation/HeartRhythm-pat-sf:
    name: Observation - Heart Rhythm
    description: Example of observation for the *Smart Health Checks Heart Rhythm* profile. Represents vital signs heart rhythm assessment for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Observation/lipid-chol-pat-sf:
    name: Observation - Lipid Cholesterol
    description: Example of observation for the *Smart Health Checks Pathology Result* profile. Represents pathology result for total cholesterol for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Observation/lipid-hdl-pat-sf:
    name: Observation - Lipid HDL
    description: Example of observation for the *Smart Health Checks Pathology Result* profile. Represents pathology result for HDL cholesterol for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Observation/SmokingStatus-pat-sf:
    name: Observation - Smoking Status
    description: Example of observation for the *Smart Health Checks Smoking Status* profile. Represents smoking status assessment for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Observation/WaistCircumference-pat-sf:
    name: Observation - Waist Circumference
    description: Example of observation for the *Smart Health Checks Waist Circumference* profile. Represents vital signs waist circumference measurement for patient, Mrs. Smart Form. This could represent a resource provided by a SHC Host FHIR Server actor for prepopulation.
    exampleBoolean: true
  Parameters/SHCPatchAllergyIntolerance1:
    name: Parameters - SHC Patch AllergyIntolerance 1
    description: Example of parameters for the *Smart Health Checks Patch AllergyIntolerance* profile. Represents patch parameters for updating allergy intolerance resources. It includes operation entries for *clinicalStatus* and *note*. The *note* entry is an example where a value was prepopulated and this will replace that value. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Parameters/SHCPatchAllergyIntolerance2:
    name: Parameters - SHC Patch AllergyIntolerance 2
    description: Example of parameters for the *Smart Health Checks Patch AllergyIntolerance* profile. Represents patch parameters for updating allergy intolerance resources. It includes an operation entry for *note* where a value was not prepopulated and this will add a new value. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Parameters/SHCPatchCondition1:
    name: Parameters - SHC Patch Condition 1
    description: Example of parameters for the *Smart Health Checks Patch Condition* profile. Represents patch parameters for updating condition resources. It includes operation entries for *clinicalStatus* and *abatement*. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Parameters/SHCPatchMedicationStatement1:
    name: Parameters - SHC Patch MedicationStatement 1
    description: Example of parameters for the *Smart Health Checks Patch MedicationStatement* profile. Represents patch parameters for updating medication statement resources. It includes operation entries for *status* and *note*. The *note* entry is an example where a value was prepopulated and this will replace that value. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Parameters/SHCPatchMedicationStatement2:
    name: Parameters - SHC Patch MedicationStatement 2
    description: Example of parameters for the *Smart Health Checks Patch MedicationStatement* profile. Represents patch parameters for updating medication statement resources. It includes operation entries for *dosage* and *note*. The *dosage* entry is an example of where a value was prepopulated and this will replace that value. The *note* entry is an example where a value was not prepopulated and this will add a new value. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Parameters/SHCPatchMedicationStatement3:
    name: Parameters - SHC Patch MedicationStatement 3
    description: Example of parameters for the *Smart Health Checks Patch MedicationStatement* profile. Represents patch parameters for updating medication statement resources. It includes operation entries for *status* and *dosage*. The *dosage* entry is an example where a value was not prepopulated and this will add a new value. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Parameters/SHCPatchMedicationStatement4:
    name: Parameters - SHC Patch MedicationStatement 4
    description: Example of parameters for the *Smart Health Checks Patch MedicationStatement* profile. Represents patch parameters for updating medication statement resources. It includes operation entries for *status* and *dosage*. The *dosage* entry is an example where a value was prepopulated and this will replace that value. It is included as an entry in the sdc-template-extract bundle example.
    exampleBoolean: true
  Patient/baby-smith-john:
    name: Patient - Baby of Emma Smith
    description: Example of patient for the *Smart Health Checks Patient* profile. Represents a newborn male patient, John Smith, used for infant health check scenarios. This could represent a resource provided by a SHC Host FHIR Server actor as launch context.
    exampleBoolean: true
  Patient/pat-sf:
    name: Patient - Mrs. Smart Form
    description: Example of patient for the *Smart Health Checks Patient* profile. Represents an Aboriginal female patient, Mrs. Smart Form, used for adult health check examples. This could represent a resource provided by a SHC Host FHIR Server actor as launch context.
    exampleBoolean: true
  Practitioner/primary-peter:
    name: Practitioner - Primary Peter
    description: Example of practitioner for the *Smart Health Checks Practitioner* profile. Represents a primary care practitioner, Dr. Peter Primary, involved in health check activities. This could represent a resource provided by a SHC Host FHIR Server actor as launch context.
    exampleBoolean: true
  QuestionnaireResponse/healthcheck-pat-sf-1370:
    name: QuestionnaireResponse - Health Check
